<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <title>Sunu-Idées</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>

        <header>
        <h1>Sunu-Idees</h1>
        <p>Le mur d'idées collaboratif de la promo P9</p>
        </header>

        <main>

        <!--formulaire d'ajout d'idee -->
        <section id="formulaire-section">
            <h2>Proposer une idée</h2>
            <form id="idee-form">
                <input type="text" id="idea-title" placeholder="Titre de l'idée" required>

                <select id="categorie">
                    <option value="" disabled selected>Choisir une catégorie</option>
                    <option value="Pedagogie">Pédagogie</option>
                    <option value="Evenement">Évènement</option>
                    <option value="Vie de campus">Vie de campus</option>
                    <option value="Amelioration technique">Amélioration technique</option>
                </select>
                <!--<input type="text" id="new-category" placeholder="Ajouter une nouvelle categorie (optionnel)">-->

                <textarea id="description" placeholder="Description de l'idée" required></textarea> 
                <button type="submit">Poster l'idée</button>
            </form>
        </section>

        <!--Le mur des idees -->
        <section id="mur-section">
            <h2>Le mur des idées</h2>
            <div id="mur">
                <!-- Les idees seront affichees ici par JavaScript -->
            </div>
        </section>
        </main>
        
        <script src="app.js"></script>
    </body>
</html>
